[database]
# "mysql" (default) or "postgres"
type     = "mysql"
user     = "root"
# Literal password (default, backward compatible):
password = "1234"
# — or reference a secret backend:
# password = "env:DB_PASSWORD"              # any env-injecting tool (Doppler CLI, Vault Agent, …)
# password = "file:/run/secrets/db_pass"   # Docker / K8s secret mount
# password = "vault:secret/data/myapp#db_password"   # HashiCorp Vault or OpenBao KV v2
# password = "doppler:DB_PASSWORD"         # Doppler
host     = "localhost"
port     = 3306          # defaults: mysql=3306, postgres=5432 (auto-set if omitted)

[ssl]
enabled            = false
ca                 = "/path/to/ca-cert.pem"
cert               = "/path/to/client-cert.pem"
key                = "/path/to/client-key.pem"
verify_server_cert = false

# Remote mode: mysql/mysqldump or psql/pg_dump is executed directly inside the container.
# type = "local"      → binaries available locally in PATH (default)
# type = "docker"     → docker exec <container> <bin> ...
# type = "kubernetes" → kubectl exec <pod> -- <bin> ...
[remote]
#type = "local"

# MySQL / MariaDB – Docker example:
# type          = "docker"
# container     = "my-mysql-container"
# mysql_bin     = "mariadb"
# mysqldump_bin = "mariadb-dump"

# MySQL / MariaDB – Kubernetes example:
 type          = "kubernetes"
 namespace     = "default"
 pod           = "mariadb-685858c-w4xsg"
 mysql_bin     = "mariadb"
 mysqldump_bin = "mariadb-dump"
# container     = "mysql"   # optional, only needed for multi-container pods

# PostgreSQL – local example:
# (set [database] type = "postgres", port = 5432)
# [remote]
# type       = "local"
# psql_bin   = "psql"
# pgdump_bin = "pg_dump"

# PostgreSQL – Kubernetes example:
# type       = "kubernetes"
# namespace  = "default"
# pod        = "postgres-abc123"
# psql_bin   = "psql"
# pgdump_bin = "pg_dump"

# ── Secret backends ────────────────────────────────────────────────────────────
# Configure one provider below if you use vault: or doppler: references above.
# The token fields themselves also support "env:" references.

# HashiCorp Vault or OpenBao (identical API — just change the address):
# [secrets.vault]
# address = "https://vault.example.com:8200"
# token   = "env:VAULT_TOKEN"   # or a literal token (not recommended)

# Doppler:
# [secrets.doppler]
# token   = "env:DOPPLER_TOKEN"
# project = "my-project"
# config  = "production"
